---
- name: Deploy WireGuard VPN infrastructure
  hosts: vpn-server
  become: true

  vars:
    vpn_dir: /home/ubuntu/vpn
    server_ip: "{{ ansible_host }}"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install Docker and dependencies
      apt:
        name:
          - docker.io
          - docker-compose-v2
        state: present

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Ensure Docker service is running
      service:
        name: docker
        state: started
        enabled: yes

    - name: Enable src_valid_mark for WireGuard
      sysctl:
        name: net.ipv4.conf.all.src_valid_mark
        value: "1"
        state: present
        reload: yes

    - name: Create VPN directory structure
      file:
        path: "{{ vpn_dir }}/{{ item }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"
      loop:
        - ""
        - prometheus
        - alertmanager
        - grafana/provisioning/datasources
        - grafana/provisioning/dashboards
        - scripts
        - textfile_collector
        - nginx

    - name: Copy docker-compose.yml
      copy:
        src: ../../docker/docker-compose.yml
        dest: "{{ vpn_dir }}/docker-compose.yml"
        owner: ubuntu
        group: ubuntu
        mode: "0644"

    - name: Create .env file with server IP
      copy:
        content: "SERVER_IP={{ server_ip }}"
        dest: "{{ vpn_dir }}/.env"
        owner: ubuntu
        group: ubuntu
        mode: "0600"

    - name: Copy Prometheus config
      copy:
        src: "../../docker/prometheus/{{ item }}"
        dest: "{{ vpn_dir }}/prometheus/{{ item }}"
        owner: ubuntu
        group: ubuntu
        mode: "0644"
      loop:
        - prometheus.yml
        - alerts.yml

    - name: Copy Alertmanager config
      copy:
        src: ../../docker/alertmanager/alertmanager.yml
        dest: "{{ vpn_dir }}/alertmanager/alertmanager.yml"
        owner: ubuntu
        group: ubuntu
        mode: "0644"

    - name: Copy Grafana datasource config
      copy:
        src: ../../docker/grafana/provisioning/datasources/datasource.yml
        dest: "{{ vpn_dir }}/grafana/provisioning/datasources/datasource.yml"
        owner: ubuntu
        group: ubuntu
        mode: "0644"

    - name: Copy Grafana dashboard provisioning config
      copy:
        src: ../../docker/grafana/provisioning/dashboards/dashboard.yml
        dest: "{{ vpn_dir }}/grafana/provisioning/dashboards/dashboard.yml"
        owner: ubuntu
        group: ubuntu
        mode: "0644"

    - name: Copy Grafana dashboard JSON
      copy:
        src: ../../docker/grafana/provisioning/dashboards/dashboard1.json
        dest: "{{ vpn_dir }}/grafana/provisioning/dashboards/dashboard1.json"
        owner: ubuntu
        group: ubuntu
        mode: "0644"

    - name: Copy WireGuard metrics script
      copy:
        src: ../../docker/scripts/wg_metrics.sh
        dest: "{{ vpn_dir }}/scripts/wg_metrics.sh"
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Copy Nginx config
      copy:
        src: ../../nginx/nginx.conf
        dest: "{{ vpn_dir }}/nginx/nginx.conf"
        owner: ubuntu
        group: ubuntu
        mode: "0644"

    - name: Create empty metrics file
      copy:
        content: ""
        dest: "{{ vpn_dir }}/textfile_collector/wireguard.prom"
        owner: ubuntu
        group: ubuntu
        mode: "0644"
        force: no

    - name: Start full stack
      community.docker.docker_compose_v2:
        project_src: "{{ vpn_dir }}"
        state: present

    - name: Wait for WireGuard to generate configs
      wait_for:
        path: "{{ vpn_dir }}/wireguard-config/peer1/peer1.conf"
        timeout: 60

    - name: Wait for Grafana to start
      wait_for:
        port: 3000
        timeout: 60

    - name: Show deployment summary
      debug:
        msg:
          - "WireGuard VPN running on port 51820"
          - "Grafana available at http://{{ server_ip }}:3000 (admin/admin123)"
          - "Prometheus available at http://{{ server_ip }}:9090"
          - "Alertmanager available at http://{{ server_ip }}:9093"
