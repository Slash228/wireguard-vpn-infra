name: Lint and Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-ansible:
    name: Lint Ansible Playbooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ansible and lint
        run: pip install ansible ansible-lint

      - name: Run Ansible Lint
        run: ansible-lint ansible/playbooks/*.yml

  validate-compose:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose -f docker/docker-compose.yml config --quiet

  validate-nginx:
    name: Validate Nginx Config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test Nginx config syntax
        run: |
          docker run --rm -v ${{ github.workspace }}/nginx/nginx.conf:/etc/nginx/nginx.conf:ro nginx:alpine nginx -t

  security-check:
    name: Check for Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for private keys
        run: |
          echo "Checking for private keys in repository..."
          if find . -path ./.git -prune -o \( -name "privatekey-*" -o -name "presharedkey-*" \) -print | grep -q .; then
            echo "ERROR: Private keys found in repository!"
            exit 1
          fi
          echo "No private keys found."

      - name: Check for hardcoded tokens
        run: |
          echo "Checking alertmanager.yml for real tokens..."
          if grep -q "YOUR_BOT_TOKEN_HERE" docker/alertmanager/alertmanager.yml; then
            echo "OK: Using placeholder token."
          else
            echo "WARNING: alertmanager.yml may contain a real token!"
            exit 1
          fi
