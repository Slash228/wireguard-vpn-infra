name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install ansible ansible-lint
          ansible-galaxy collection install community.docker ansible.posix

      - name: Ansible Lint
        run: |
          cd ansible && ansible-lint playbooks/

      - name: Validate Docker Compose
        run: |
          docker compose -f docker/docker-compose.yml config

      - name: Validate Nginx Config
        run: |
          sed 's/grafana:3000/127.0.0.1:3000/g; s/prometheus:9090/127.0.0.1:9090/g' \
            nginx/nginx.conf > /tmp/nginx-ci.conf
          mkdir -p /tmp/ssl
          openssl req -x509 -nodes -days 1 -newkey rsa:2048 \
            -keyout /tmp/ssl/nginx.key \
            -out /tmp/ssl/nginx.crt \
            -subj "/CN=localhost"
          docker run --rm \
            -v "/tmp/nginx-ci.conf:/etc/nginx/nginx.conf:ro" \
            -v "/tmp/ssl:/etc/nginx/ssl:ro" \
            nginx:alpine nginx -t

      - name: Security Check
        run: |
          ! grep -r "PRIVATE KEY" ansible/ docker/ nginx/ || exit 1
          ! grep -rE "bot[0-9]+:[A-Za-z0-9_-]{35}" docker/ || exit 1
