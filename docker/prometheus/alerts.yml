groups:
  - name: wireguard-alerts
    rules:
      - alert: WireGuardPeerInactive24h
        expr: (time() - wireguard_latest_handshake_seconds) > 86400
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "WireGuard peer inactive >24h"
          description: "Peer {{ $labels.peer }} has not connected for more than 24 hours."

      - alert: WireGuardHighTraffic
        expr: rate(wireguard_received_bytes_total[5m]) > 10000000 or rate(wireguard_sent_bytes_total[5m]) > 10000000
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Abnormally high WireGuard traffic"
          description: "Peer {{ $labels.peer }} has unusually high traffic."

      - alert: HostDiskUsageHigh
        expr: (1 - (node_filesystem_avail_bytes{mountpoint="/",fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{mountpoint="/",fstype!~"tmpfs|overlay"})) * 100 > 80
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk usage > 80%"
          description: "Root filesystem usage is above 80%."

      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service is down"
          description: "Target {{ $labels.job }} is down."
