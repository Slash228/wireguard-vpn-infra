route:
  receiver: telegram
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 1h

receivers:
  - name: telegram
    telegram_configs:
      - bot_token: "YOUR_BOT_TOKEN_HERE"
        chat_id: 0
        send_resolved: true
        parse_mode: HTML
        message: |
          <b>{{ .CommonLabels.alertname }}</b>
          <b>Severity:</b> {{ .CommonLabels.severity }}
          <b>Summary:</b> {{ .CommonAnnotations.summary }}
          <b>Description:</b> {{ .CommonAnnotations.description }}
